<!DOCTYPE html>

    <title>Laboratório Kafka | Jéssica Etiene</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-project-id="kafka-lab">
    <main class="kafka-layout card">

            <button id="themeToggle" class="theme-toggle theme-toggle-switch" type="button" aria-label="Alternar tema" aria-pressed="false">

                <span class="toggle-icon toggle-icon-sun">☀️</span>
                <span class="toggle-thumb"></span>
                <span class="toggle-icon toggle-icon-moon">🌙</span>

            <p id="descricaoProjeto"></p>

          <h2 id="kafka-lab-topicos"></h2>
          <p id="kafka-lab-texto"></p>

    <script src="../script.js"></script>
