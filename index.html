<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="top-actions">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema">🌙 Dark</button>
      </div>
      <h1 id="nome"></h1>
      <p id="bio"></p>
      <a class="btn" href="#projetos">Ver projetos</a>
    </header>

    <main>
      <section id="sobre" class="card">
        <h2>Sobre mim</h2>
        <div class="sobre-layout">
          <img id="fotoPerfil" class="foto-perfil" src="" alt="Foto de perfil" />
          <div>
            <p id="sobreTexto"></p>
            <p><strong>Quem sou:</strong> <span id="quemSou"></span></p>
            <p><strong>Onde trabalho:</strong> <span id="ondeTrabalho"></span></p>
            <h3>Tecnologias</h3>
            <div id="badgesTecnologias" class="badges"></div>
          </div>
        </div>
      </section>

      <section id="projetos" class="card">
        <h2>Projetos</h2>
        <p>Clique em um projeto para abrir uma página com detalhes.</p>
        <div id="listaProjetos" class="grid"></div>
      </section>

      <section id="contato" class="card">
        <h2>Contato</h2>
        <ul id="contatos"></ul>
      </section>
    </main>

    <footer>
      <small>© <span id="ano"></span> <span id="assinatura"></span></small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
