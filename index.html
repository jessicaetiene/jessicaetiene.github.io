<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio | Jéssica Etiene</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar card">
        <img id="fotoPerfil" class="avatar" src="" alt="Foto de perfil" />
        <h1 id="nome"></h1>
        <p class="role">Software Engineer | Data Engineer</p>

        <div class="sidebar-block">
          <h2 id="contatoTitulo">Contato</h2>
          <ul id="contatos" class="contact-list"></ul>
        </div>

        <div class="sidebar-block">
          <h2 id="tecnologiasTitulo">Tecnologias</h2>
          <div id="badgesTecnologias" class="badges"></div>
        </div>
      </aside>

      <main class="content card">
        <header class="content-header">
          <div class="header-right">
            <button class="lang-btn" data-lang="pt" type="button" aria-label="Português">
              <img src="https://flagcdn.com/w20/br.png" srcset="https://flagcdn.com/w40/br.png 2x" alt="" aria-hidden="true" />
            </button>
            <button class="lang-btn" data-lang="en" type="button" aria-label="English">
              <img src="https://flagcdn.com/w20/us.png" srcset="https://flagcdn.com/w40/us.png 2x" alt="" aria-hidden="true" />
            </button>
          </div>
          <nav>
            <a href="#sobre" id="navSobre" class="nav-link active">About</a>
            <a href="#projetos" id="navPortfolio" class="nav-link">Portfolio</a>
          </nav>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema">🌙 Dark</button>
        </header>

        <section id="sobre" class="section">
          <h2>About Me</h2>
          <p id="bio"></p>
          <p id="sobreTexto"></p>
          <p><strong id="quemSouLabel">Quem sou:</strong> <span id="quemSou"></span></p>
          <p><strong id="ondeTrabalhoLabel">Onde trabalho:</strong> <span id="ondeTrabalho"></span></p>
        </section>

        <section id="projetos" class="section">
          <h2>Projetos</h2>
          <p id="projetosHint">Clique em um projeto para acessar os detalhes.</p>
          <div id="listaProjetos" class="project-grid"></div>
        </section>
      </main>
    </div>

    <footer>
      <small>© <span id="ano"></span> <span id="assinatura"></span></small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
