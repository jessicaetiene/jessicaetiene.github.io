<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio | Jessica Etiene</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar card">
        <img id="fotoPerfil" class="avatar" src="" alt="Foto de perfil" />
        <h1 id="nome"></h1>
        <p class="role">Web Developer</p>

        <div class="sidebar-block">
          <h2>Contato</h2>
          <ul id="contatos" class="contact-list"></ul>
        </div>

        <div class="sidebar-block">
          <h2>Tecnologias</h2>
          <div id="badgesTecnologias" class="badges"></div>
        </div>
      </aside>

      <main class="content card">
        <header class="content-header">
          <nav>
            <a href="#sobre" class="nav-link active">About</a>
            <a href="#projetos" class="nav-link">Portfolio</a>
          </nav>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema">🌙 Dark</button>
        </header>

        <section id="sobre" class="section">
          <h2>About Me</h2>
          <p id="bio"></p>
          <p id="sobreTexto"></p>
          <p><strong>Quem sou:</strong> <span id="quemSou"></span></p>
          <p><strong>Onde trabalho:</strong> <span id="ondeTrabalho"></span></p>
        </section>

        <section id="projetos" class="section">
          <h2>Projetos</h2>
          <p>Clique em um projeto para abrir sua própria página HTML com detalhes.</p>
          <div id="listaProjetos" class="project-grid"></div>
        </section>
      </main>
    </div>

    <footer>
      <small>© <span id="ano"></span> <span id="assinatura"></span></small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
